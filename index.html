<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jiyoung You | Forensic &amp; Developmental Psychology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


    :root {
      --bg: #F5F7FC;
      --bg-card: #EEF1F9;
      --bg-nav: rgba(245,247,252,0.92);
      --accent: #2E5090;
      --accent-dark: #1F3A6B;
      --accent-light: #5B8FD9;
      --text: #17202E;
      --text-muted: #4A5A75;
      --border: #D0D9E8;
      --hero-grad: linear-gradient(135deg, #F5F7FC 0%, #EBF0F8 100%);
    }


    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }


    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg-nav); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: 0.02em; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.875rem; font-weight: 500; color: var(--text-muted); text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }


    /* HERO */
    #home { min-height: 100vh; background: var(--hero-grad); display: flex; align-items: center; padding: 120px 2rem 80px; }
    .hero-inner { max-width: 1100px; margin: 0 auto; width: 100%; display: grid; grid-template-columns: 1fr 340px; gap: 4rem; align-items: center; }
    .hero-text h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 5vw, 4.2rem); font-weight: 700; line-height: 1.15; color: var(--text); margin-bottom: 0.4rem; }
    .hero-text h1 span { color: var(--accent); }
    .hero-tagline { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; color: var(--accent-dark); margin-bottom: 1.6rem; }
    .hero-keywords { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem; }
    .keyword { background: var(--bg-card); border: 1px solid var(--border); color: var(--accent-dark); font-size: 0.85rem; font-weight: 500; padding: 0.35rem 0.9rem; border-radius: 999px; letter-spacing: 0.03em; }
    .hero-desc { font-size: 1rem; color: var(--text-muted); max-width: 100%; margin-bottom: 2.2rem; line-height: 1.8; text-align: justify; }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.75rem 1.6rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; text-decoration: none; transition: all 0.25s; cursor: pointer; border: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
    .btn-outline:hover { background: var(--accent); color: #fff; transform: translateY(-1px); }


    .hero-photo { width: 100%; aspect-ratio: 3/4; background: var(--bg-card); border: 2px dashed var(--border); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.8rem; color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 1rem; }
    .hero-photo svg { width: 48px; height: 48px; opacity: 0.4; }
    .photo-hint { font-size: 0.75rem; color: var(--border); }


    /* SECTIONS */
    section { padding: 100px 2rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.6rem; }
    .section-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 700; color: var(--text); margin-bottom: 1rem; }
    .section-divider { width: 48px; height: 3px; background: var(--accent); border-radius: 2px; margin-bottom: 3rem; }
